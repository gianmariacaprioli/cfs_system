/motion_capture_tracking:
  ros__parameters:
    # one of "optitrack", "optitrack_closed_source", "vicon", "qualisys", "nokov", "vrpn", "motionanalysis"
    type: "optitrack_closed_source"
    # Specify the hostname or IP of the computer running the motion capture software
    hostname: "10.43.0.130"

    topics:
      frame_id: "world" #b4 map
      poses:
        qos:
          mode: "sensor"
          deadline: 100.0 # Hz
      tf:
        child_frame_id: '{}_mocap' 
      rigid_bodies: 
        obs_0: 3
      #   cf_0:
      #     id: 5
      #   cf_1:
      #     id: 6
      #   cf_2:
      #     id: 7
        # cf00:
        #   id: 8      
      #   cf_4:
      #     id: 4


    marker_configurations:
      default: # for standard Crazyflie
        offset: [0.0, 0.0, 0.0]
        points:
          p0: [   0.0,    0.0, 0.022]  # top
          p1: [-0.042,  0.042, 0.0  ]  # back left   (M3)
          p2: [-0.042, -0.042, 0.0  ]  # back right  (M2)
          p3: [ 0.042, -0.042, 0.0  ]  # front right (M1)
      default_single_marker:
        # offset: [0.0, -0.01, -0.04]
        offset: [0.0, 0.0, 0.0]
        points:
          p0: [0.0177184,0.0139654,0.0557585]
      mocap_deck:
        offset: [0.0, 0.0, -0.01]
        points:
          p0: [0.03, 0.0, 0.0] # front
          p1: [0.00, -0.03, 0.0] # right
          p2: [-0.015, 0.0, 0.0] # back
          p3: [0.00, 0.03, 0.0] # left
      medium_frame:
        offset: [0.0, 0.0, -0.03]
        points:
          p0: [-0.00896228,-0.000716753,0.0716129]
          p1: [-0.0156318,0.0997402,0.0508162]
          p2: [0.0461693,-0.0881012,0.0380672]
          p3: [-0.0789959,-0.0269793,0.0461144]
      big_frame:
        offset: [0.0, 0.0, -0.06]
        points:
          p0: [0.0558163,-0.00196302,0.0945539]
          p1: [-0.0113941,0.00945842,0.0984811]
          p2: [-0.0306277,0.0514879,0.0520456]
          p3: [0.0535816,-0.0400775,0.0432799]

      chassis_cf0:
        offset: [0.0, 0.0, 0.0]
        points:
          p0: [ 0.00455, -0.10715,  0.00227] # Point 1 (Destra)
          p1: [ 0.10495,  0.01906,  0.00043] # Point 2 (Muso / Anteriore)
          p2: [-0.04743,  0.09796, -0.00255] # Point 3 (Sinistra)
          p3: [-0.06229, -0.00996,  0.00022] # Point 4 (Coda / Posteriore)

      chassis_cf1:
        offset: [0.0, 0.0, 0.0]
        points:
          p0: [-0.00250,  0.07874, -0.01064] # Point 1 (Sinistra)
          p1: [ 0.05859,  0.00283,  0.00053] # Point 2 (Muso / Anteriore)
          p2: [-0.04027,  0.00980,  0.03733] # Point 3 (Posteriore, Rialzato)
          p3: [-0.01585, -0.09144, -0.02724] # Point 4 (Destra)

      chassis_cf2:
        offset: [0.0, 0.0, 0.0]
        points:
          p0: [ 0.11666, -0.10501, -0.00822] # Point 1
          p1: [-0.07198, -0.07845, -0.01566] # Point 2
          p2: [-0.09815,  0.07926,  0.04207] # Point 3 (Rialzato)
          p3: [ 0.05347,  0.10418, -0.01799] # Point 4

    dynamics_configurations:
      default:
        max_velocity: [2, 2, 3] # m/s
        max_angular_velocity: [20, 20, 10] # rad/s
        max_roll: 1.4 #rad
        max_pitch: 1.4 #rad
        max_fitness_score: 0.02 #b4

    # Rigid bodies will be automatically generated by the launch file
    # rigid_bodies:
# Definition of the various robot types
robot_types:

  cf_sim:
    motion_capture:
      tracking: "librigidbodytracker"   
      marker: default_single_marker
      dynamics: default
      enabled: true
    big_quad: false
    firmware_logging:
      enabled: true
      default_topics:
        pose:
          frequency: 10

  cf21:
    motion_capture:
      tracking: "vendor"  
      enabled: true
      marker: default
      dynamics: default
    firmware_logging:
      enabled: true
      default_topics:
        pose:
          frequency: 10
    big_quad: false
    battery:
      voltage_warning: 3.8
      voltage_critical: 3.7

  cf_one:
    motion_capture:   
      tracking: "librigidbodytracker"  
      enabled: true
      marker:  default_single_marker
